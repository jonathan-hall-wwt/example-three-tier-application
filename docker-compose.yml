services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ./src/db
    environment:
      DATABASE_URL: postgres://app:app@postgres:5432/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: ./src/api
    environment:
      PORT: 3001
      DATABASE_URL: postgres://app:app@postgres:5432/app
    depends_on:
      migrate:
        condition: service_completed_successfully
    expose:
      - "3001"

  web:
    build:
      context: ./src/web
    environment:
      PORT: 3000
      API_URL: http://api:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
