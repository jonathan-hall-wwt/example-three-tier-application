name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  REGION: us-central1
  APP_NAME: todo

jobs:
  # ── Build & push container images ────────────────────────────────────────────

  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    permissions:
      contents: read
      id-token: write

    outputs:
      env:       ${{ steps.vars.outputs.env }}
      api_image: ${{ steps.vars.outputs.api_image }}
      web_image: ${{ steps.vars.outputs.web_image }}
      db_image:  ${{ steps.vars.outputs.db_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: vars
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          SHA="${{ github.sha }}"
          echo "env=${ENV}"                                      >> "$GITHUB_OUTPUT"
          echo "api_image=gcr.io/${PROJECT}/api:${SHA}"         >> "$GITHUB_OUTPUT"
          echo "web_image=gcr.io/${PROJECT}/web:${SHA}"         >> "$GITHUB_OUTPUT"
          echo "db_image=gcr.io/${PROJECT}/db:${SHA}"           >> "$GITHUB_OUTPUT"

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: src/api
          push: true
          tags: |
            ${{ steps.vars.outputs.api_image }}
            gcr.io/${{ secrets.GCP_PROJECT_ID }}/api:latest
          cache-from: type=registry,ref=gcr.io/${{ secrets.GCP_PROJECT_ID }}/api:cache
          cache-to:   type=registry,ref=gcr.io/${{ secrets.GCP_PROJECT_ID }}/api:cache,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: src/web
          push: true
          tags: |
            ${{ steps.vars.outputs.web_image }}
            gcr.io/${{ secrets.GCP_PROJECT_ID }}/web:latest
          cache-from: type=registry,ref=gcr.io/${{ secrets.GCP_PROJECT_ID }}/web:cache
          cache-to:   type=registry,ref=gcr.io/${{ secrets.GCP_PROJECT_ID }}/web:cache,mode=max

      - name: Build & push DB migrations
        uses: docker/build-push-action@v6
        with:
          context: src/db
          push: true
          tags: |
            ${{ steps.vars.outputs.db_image }}
            gcr.io/${{ secrets.GCP_PROJECT_ID }}/db:latest
          cache-from: type=registry,ref=gcr.io/${{ secrets.GCP_PROJECT_ID }}/db:cache
          cache-to:   type=registry,ref=gcr.io/${{ secrets.GCP_PROJECT_ID }}/db:cache,mode=max

  # ── Provision / update infrastructure ────────────────────────────────────────

  infrastructure:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ needs.build.outputs.env }}

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: src/infrastructure

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/${{ needs.build.outputs.env }}"

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="region=${{ env.REGION }}" \
            -var="app_name=${{ env.APP_NAME }}" \
            -var="environment=${{ needs.build.outputs.env }}" \
            -var="api_image=${{ needs.build.outputs.api_image }}" \
            -var="web_image=${{ needs.build.outputs.web_image }}" \
            -var="db_image=${{ needs.build.outputs.db_image }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # ── Run database migrations ───────────────────────────────────────────────────

  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: [build, infrastructure]
    environment: ${{ needs.build.outputs.env }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Execute migration Cloud Run Job
        # Job name matches the naming convention in migration.tf:
        # "${app_name}-${environment}-migrate"
        run: |
          gcloud run jobs execute \
            "${{ env.APP_NAME }}-${{ needs.build.outputs.env }}-migrate" \
            --region "${{ env.REGION }}" \
            --wait
